version: "3.9"

# ==============================================================
# Spring Boot Microservices - Local Docker Compose Setup
# Run: docker-compose up --build
# ==============================================================

services:

  # ----------------------------------------------------------
  # User Service
  # ----------------------------------------------------------
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: poc/user-service:latest
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ----------------------------------------------------------
  # Order Service
  # ----------------------------------------------------------
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    image: poc/order-service:latest
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - USER_SERVICE_URL=http://user-service:8081
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    depends_on:
      user-service:
        condition: service_healthy
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  poc-network:
    driver: bridge
    name: spring-poc-network
