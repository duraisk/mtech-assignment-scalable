apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: spring-poc
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
      nodePort: 30082        # Accessible at localhost:30082 on Docker Desktop
  type: NodePort
