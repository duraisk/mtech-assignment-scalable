apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: spring-poc
  labels:
    app: order-service
    version: v1
spec:
  replicas: 2                         # Initial replica count
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
        version: v1
    spec:
      containers:
        - name: order-service
          image: poc/order-service:latest
          imagePullPolicy: Never       # Use local image (Docker Desktop K8s)
          ports:
            - containerPort: 8082
              name: http

          # ---- Environment Variables ----
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"   # K8s DNS service discovery
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

          # ---- Resource Limits (critical for HPA) ----
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ---- Liveness Probe ----
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3

          # ---- Readiness Probe ----
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          # ---- Startup Probe ----
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 20
            periodSeconds: 5

      terminationGracePeriodSeconds: 30
