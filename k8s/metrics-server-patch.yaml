# ============================================================
# Metrics Server Patch for Docker Desktop Kubernetes
# Required for HPA to work (reads CPU/memory metrics)
#
# Apply with:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   kubectl patch deployment metrics-server -n kube-system --patch-file k8s/metrics-server-patch.yaml
# ============================================================
spec:
  template:
    spec:
      containers:
        - name: metrics-server
          args:
            - --cert-dir=/tmp
            - --secure-port=4443
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
            - --kubelet-insecure-tls      # Required for Docker Desktop (self-signed certs)
