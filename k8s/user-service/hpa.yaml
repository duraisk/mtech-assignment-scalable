apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: spring-poc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service

  # ---- Scaling Boundaries ----
  minReplicas: 2              # Always keep at least 2 for HA
  maxReplicas: 10             # Scale up to 10 pods maximum

  metrics:
    # ---- CPU-based Scaling ----
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # Scale when CPU > 50% of request

    # ---- Memory-based Scaling ----
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70    # Scale when memory > 70% of request

  # ---- Scaling Behavior (prevents thrashing) ----
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30     # Wait 30s before scaling up again
      policies:
        - type: Pods
          value: 2                       # Add max 2 pods per scale event
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120    # Wait 2 min before scaling down
      policies:
        - type: Pods
          value: 1                       # Remove max 1 pod per scale event
          periodSeconds: 60
